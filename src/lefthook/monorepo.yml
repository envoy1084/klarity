min_version: 2.1.0

pre-commit:
  jobs:
    - name: format
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts,json,jsonc,css,scss,md,mdx,yaml,yml}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
    - name: lint
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}"
      run: pnpm exec oxlint --deny-warnings {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

pre-push:
  jobs:
    - name: check
      run: pnpm exec turbo run lint typecheck test
